use_default_settings:
  engines:
    remove:
      - ahmia
      - torch
      - wikidata

general:
  debug: false
  instance_name: "brokerai searxng"

search:
  safe_search: 1
  formats:
    - html
    - json

server:
  bind_address: "0.0.0.0"
  port: 8080
  limiter: false
  secret_key: "change-this-searxng-secret-for-shared-deployments"
